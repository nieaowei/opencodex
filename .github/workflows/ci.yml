name: Cross-platform CI

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "src/**"
      - "bin/**"
      - "tests/**"
      - "scripts/**"
      - "gui/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  push:
    branches: [main, preview, dev]
    paths:
      - "src/**"
      - "bin/**"
      - "tests/**"
      - "scripts/**"
      - "gui/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Test
        run: bun test tests

      - name: Privacy scan
        run: bun run privacy:scan

      - name: Check release helper syntax
        run: bun build scripts/release.ts --target=bun --outdir=.tmp/ci-release-script-check

      - name: GUI build
        run: cd gui && bun install && bun run build

      - name: CLI help smoke
        run: bun run src/cli.ts help

  npm-global-smoke:
    name: npm-global ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Deliberately NO setup-bun: prove `npm install -g` works without a
      # separately-installed Bun. The launcher uses the bundled `bun` dependency.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pack
        run: npm pack

      - name: Install globally (downloads bundled bun)
        shell: bash
        run: npm install -g ./bitkyc08-opencodex-*.tgz

      - name: ocx help via bundled bun
        run: ocx help
